{% extends "layout.html" %}

{% block content %}
<div class="max-w-xl mx-auto py-12">
    <div class="mb-card p-10 shadow-2xl bg-white border-none">
        <div class="flex items-center gap-4 mb-10 border-b border-gray-100 pb-8">
            <div class="w-12 h-12 bg-black text-white rounded-2xl flex items-center justify-center font-bold text-xl shadow-lg shadow-gray-200">
                <i class="fas fa-plus"></i>
            </div>
            <div>
                <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">New Assessment</h2>
                <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-1">Mercedes-Benz Internal Use</p>
            </div>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-2 ml-1">Project Name / Reference</label>
                <input type="text" name="project_name" required placeholder="e.g. BR214 Interior Compliance v1" 
                    class="w-full px-5 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black focus:border-transparent transition-all outline-none bg-gray-50/50 text-base font-medium shadow-inner">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-2 ml-1">VIN Number</label>
                    <input type="text" name="vin_number" placeholder="W1K..." 
                        class="w-full px-5 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black outline-none bg-gray-50/50 text-sm">
                </div>
                <div>
                    <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-[0.3em] mb-2 ml-1">Model Series</label>
                    <input type="text" name="model_series" placeholder="Actros / Citaro / E-Class" 
                        class="w-full px-5 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black outline-none bg-gray-50/50 text-sm">
                </div>
            </div>
            
            <div class="flex items-center gap-4 bg-gray-50 p-6 rounded-2xl border border-gray-100">
                <div class="w-10 h-10 bg-white rounded-xl flex items-center justify-center shadow-sm">
                    <i class="fas fa-database text-gray-300"></i>
                </div>
                <p class="text-[10px] text-gray-400 font-bold leading-relaxed uppercase tracking-widest">
                    This project will be stored in the database.<br>You can resume editing at any time.
                </p>
            </div>

            <div class="flex flex-col sm:flex-row gap-4 pt-6">
                <a href="{{ url_for('index') }}" class="flex-1 px-8 py-4 rounded-2xl border border-gray-200 font-bold text-xs text-gray-500 hover:bg-gray-50 transition-all text-center tracking-widest">CANCEL</a>
                <button type="submit" class="flex-1 mb-btn-primary py-4 rounded-2xl font-bold text-xs shadow-xl tracking-[0.2em] active:scale-[0.98] transition-transform">
                    START ASSESSMENT
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
