{% extends "layout.html" %}

{% block content %}
<div class="max-w-md mx-auto py-12">
    <div class="mb-card p-8 md:p-12 shadow-2xl">
        <div class="text-center mb-10">
            <div class="inline-block p-4 bg-black text-white rounded-full mb-6">
                <i class="fas fa-key text-2xl"></i>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 tracking-tight">Internal Portal</h2>
            <p class="text-gray-400 text-xs font-bold uppercase tracking-widest mt-2">Quality Assurance System</p>
        </div>

        <form method="POST" class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Username</label>
                <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black focus:border-transparent transition-all outline-none bg-gray-50/50">
            </div>
            <div>
                <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mb-2 ml-1">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-black focus:border-transparent transition-all outline-none bg-gray-50/50">
            </div>
            
            <button type="submit" class="w-full mb-btn-primary py-4 rounded-xl font-bold text-sm shadow-lg hover:shadow-black/20 active:scale-[0.98] transition-all mt-4">
                LOGIN TO PORTAL
            </button>
        </form>

        <div class="mt-8 pt-8 border-t border-gray-100 text-center">
            <p class="text-[10px] text-gray-400 font-medium leading-relaxed uppercase tracking-wider">
                This is a secure Mercedes-Benz internal system.<br>Unauthorized access is strictly prohibited.
            </p>
        </div>
    </div>
</div>
{% endblock %}
